<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Wiring diagram for Raspberry Pi Pico 2 W and SCD41 breakout</title>
  <desc id="desc">Functional wiring diagram showing 3V3, GND, SDA and SCL connections between the Pico 2 W and an SCD41 breakout.</desc>
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .panel { fill: #111827; stroke: #334155; stroke-width: 2; rx: 22; ry: 22; }
      .title { fill: #e5e7eb; font: 700 28px 'Segoe UI', Arial, sans-serif; }
      .subtitle { fill: #94a3b8; font: 400 16px 'Segoe UI', Arial, sans-serif; }
      .label { fill: #e5e7eb; font: 700 20px 'Segoe UI', Arial, sans-serif; }
      .small { fill: #cbd5e1; font: 400 14px 'Segoe UI', Arial, sans-serif; }
      .pintext { fill: #e2e8f0; font: 600 14px 'Segoe UI', Arial, sans-serif; }
      .note { fill: #cbd5e1; font: 400 13px 'Segoe UI', Arial, sans-serif; }
      .wire { fill: none; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
      .pwr { stroke: #ef4444; }
      .gnd { stroke: #111827; }
      .sda { stroke: #f97316; }
      .scl { stroke: #3b82f6; }
      .pin { fill: #f8fafc; stroke: #64748b; stroke-width: 1.5; }
      .legend-title { fill: #e5e7eb; font: 700 16px 'Segoe UI', Arial, sans-serif; }
      .legend-text { fill: #cbd5e1; font: 400 13px 'Segoe UI', Arial, sans-serif; }
      .legend-line { stroke-width: 6; stroke-linecap: round; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="720" />
  <text class="title" x="60" y="58">Raspberry Pi Pico 2 W + SCD41 breakout</text>
  <text class="subtitle" x="60" y="86">Diagrama funcional del cableado I2C y alimentación. Fuente textual: docs/hardware/wiring.yaml</text>

  <rect class="panel" x="70" y="140" width="500" height="430" />
  <text class="label" x="105" y="182">Pico 2 W</text>
  <text class="small" x="105" y="208">Lado funcional documentado para firmware actual</text>

  <rect x="240" y="220" width="150" height="260" fill="#14532d" stroke="#86efac" stroke-width="2" rx="18" ry="18" />
  <text class="small" x="263" y="350" transform="rotate(-90 263 350)">Raspberry Pi Pico 2 W</text>

  <circle class="pin" cx="220" cy="260" r="8" />
  <circle class="pin" cx="220" cy="320" r="8" />
  <circle class="pin" cx="220" cy="380" r="8" />
  <circle class="pin" cx="220" cy="440" r="8" />

  <text class="pintext" x="105" y="265">3V3(OUT)</text>
  <text class="pintext" x="105" y="325">GP0 / SDA</text>
  <text class="pintext" x="105" y="385">GND</text>
  <text class="pintext" x="105" y="445">GP1 / SCL</text>

  <rect class="panel" x="690" y="210" width="370" height="290" />
  <text class="label" x="730" y="250">SCD41 breakout</text>
  <text class="small" x="730" y="276">Nombres de pines segun serigrafía visible del módulo</text>

  <rect x="820" y="300" width="120" height="120" fill="#1d4ed8" stroke="#93c5fd" stroke-width="2" rx="16" ry="16" />
  <text class="small" x="845" y="365" transform="rotate(-90 845 365)">SCD41 board</text>

  <circle class="pin" cx="960" cy="320" r="8" />
  <circle class="pin" cx="960" cy="360" r="8" />
  <circle class="pin" cx="960" cy="400" r="8" />
  <circle class="pin" cx="960" cy="440" r="8" />

  <text class="pintext" x="980" y="325">VCC</text>
  <text class="pintext" x="980" y="365">SDA</text>
  <text class="pintext" x="980" y="405">GND</text>
  <text class="pintext" x="980" y="445">SCL</text>

  <path class="wire pwr" d="M228 260 C420 260, 500 320, 952 320" />
  <path class="wire sda" d="M228 320 C420 320, 520 360, 952 360" />
  <path class="wire gnd" d="M228 380 C420 380, 540 400, 952 400" />
  <path class="wire scl" d="M228 440 C420 440, 520 440, 952 440" />

  <text class="note" x="70" y="620">Fuente de verdad del bus I2C: src/sensor_scd41.py → I2C(0, sda=Pin(0), scl=Pin(1), freq=100_000)</text>
  <text class="note" x="70" y="645">Esta primera versión documenta solo el camino eléctrico funcional; no incluye fixture mecánico ni cableado USB externo.</text>

  <text class="legend-title" x="700" y="560">Leyenda de señales</text>
  <line class="legend-line pwr" x1="700" y1="590" x2="740" y2="590" />
  <text class="legend-text" x="755" y="595">3V3 a VCC</text>
  <line class="legend-line sda" x1="700" y1="620" x2="740" y2="620" />
  <text class="legend-text" x="755" y="625">SDA: GP0 → SDA</text>
  <line class="legend-line gnd" x1="700" y1="650" x2="740" y2="650" />
  <text class="legend-text" x="755" y="655">GND común</text>
  <line class="legend-line scl" x1="700" y1="680" x2="740" y2="680" />
  <text class="legend-text" x="755" y="685">SCL: GP1 → SCL</text>
</svg>
